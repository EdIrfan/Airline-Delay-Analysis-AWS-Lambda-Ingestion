version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.14  
    commands:
      - echo "[INSTALL]: Installing dependencies..."
      - pip install --upgrade pip
      - pip install -r test/requirements.txt
      - echo "[INSTALL]: Updating AWS SAM CLI..."
      - pip install aws-sam-cli

  pre_build:
    commands:
      - echo "[PRE-BUILD]: Running Unit Tests..."
      - export PYTHONPATH=$PYTHONPATH:$(pwd)/src
      # Note: 'test' folder (singular) to match your screenshot
      - python -m pytest test/unit/ -v

  build:
    commands:
      - echo "[BUILD]: Packaging SAM template for ${ENV_TYPE}..."
      - sam package \
          --template-file CDF_Template/template.yml \
          --s3-bucket $ARTIFACT_BUCKET \
          --output-template-file packaged.yaml

  post_build:
    commands:
      - echo "[POST-BUILD]: Build completed on $(date)"

artifacts:
  files:
    - packaged.yaml
  discard-paths: yes